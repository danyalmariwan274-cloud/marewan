<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>ئابوری</title>

<style>
body{
    background:#f5f5f5;
    font-family:Noto Sans Arabic;
    direction:rtl;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.card{
    width:80%;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

img{
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <h1>ئابوری کوردستان</h1>
</header>

<div class="card">
    <img src="images/economy.jpg" alt="ئابوری">
    <h2>گەشەی ئابوری</h2>
    <p>
        ئەم بەشە تایبەتە بە هەواڵ و زانیارییە ئابورییەکان.
    </p>
</div>

<div class="card">
    <img src="images/market.jpg" alt="بازاڕ">
    <h2>بازاڕ</h2>
    <p>
        دوایین زانیارییەکانی بازاڕ و نرخەکان.
    </p>
</div>

</body>
</html
